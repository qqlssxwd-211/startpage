<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
    overflow-x: hidden; overflow-y: auto;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
  }

  /* ── 背景 ── */
  .bg-gradient {
    position: fixed; inset: 0; z-index: -1;
    background: linear-gradient(170deg, #0e1625 0%, #111c30 20%, #162638 50%, #0f1a28 80%, #0a101c 100%);
  }
  .bg-image {
    position: fixed; inset: 0; z-index: 0;
    background-size: cover; background-position: center;
    transform: scale(1);
    transition: background-image 1.2s ease,
                transform 0.70s cubic-bezier(0.22,0.61,0.36,1);
  }
  .bg-image.zoomed { transform: scale(1.06); }
  .bg-blur {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    backdrop-filter: blur(0px);
    -webkit-backdrop-filter: blur(0px);
    background: rgba(0,0,0,0.12);
    transition: backdrop-filter 0.70s cubic-bezier(0.22,0.61,0.36,1),
                -webkit-backdrop-filter 0.70s cubic-bezier(0.22,0.61,0.36,1),
                background 0.70s ease;
  }
  .bg-blur.on {
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    background: rgba(0,0,0,0.33);
  }

  /* ── 搜索框 ── */
  .search-wrap {
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 22px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    transition: all 0.35s ease;
    width: 560px; max-width: 100%;
  }
  .search-wrap:focus-within {
    background: rgba(255,255,255,0.17);
    border-color: rgba(255,255,255,0.28);
    box-shadow: 0 6px 36px rgba(0,0,0,0.18);
  }
  .search-input {
    background: transparent; border: none; outline: none;
    color: #fff; font-size: 15px; width: 100%; padding: 0 4px;
    font-family: inherit; text-align: center;
    transition: text-align 0.01s;
  }
  .search-input.has-text,
  .search-input:focus { text-align: left; }
  .search-input::placeholder { color: rgba(255,255,255,0.38); text-align: center; }
  .search-input:focus::placeholder { color: transparent; }

  /* ── 引擎图标 ── */
  .engine-icon {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; user-select: none;
    background: rgba(0,0,0,0.38); transition: transform 0.25s ease;
  }
  .engine-icon img { width: 28px; height: 28px; object-fit: contain; }
  .engine-icon:hover { transform: scale(1.12); }
  .engine-icon:active { transform: scale(0.92); }

  /* ── 翻译 ── */
  .tran-box { animation: slideUp 0.26s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .tran-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 14px; width: 560px; max-width: 100%;
  }

  /* ── 时钟 ── */
  .clock {
    text-shadow: 0 2px 36px rgba(0,0,0,0.35);
    cursor: pointer; user-select: none;
    transition: transform 0.2s ease;
  }
  .clock:hover { transform: scale(1.03); }
  .clock:active { transform: scale(0.97); }

  /* ── 默认底部捷径面板 ── */
  .sc-panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    padding: 14px 20px 24px;
    background: transparent;
  }
  .sc-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 0 0; }
  .sc-item {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    cursor: pointer; user-select: none; transition: transform 0.18s ease;
    width: 66px; padding: 5px 2px; border-radius: 10px;
  }
  .sc-item:hover { transform: translateY(-2px); background: rgba(255,255,255,0.05); }
  .sc-item:active { transform: scale(0.93); }
  .sc-icon-wrap {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,0.14);
    transition: box-shadow 0.18s ease;
  }
  .sc-item:hover .sc-icon-wrap { box-shadow: 0 4px 14px rgba(0,0,0,0.22); }
  .sc-icon-char { font-size: 16px; font-weight: 600; color: #fff; }
  .sc-name {
    font-size: 10px; color: rgba(255,255,255,0.65);
    text-align: center; max-width: 60px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .sc-del {
    position: absolute; top: -5px; right: -5px;
    width: 17px; height: 17px; border-radius: 50%;
    background: rgba(239,68,68,0.88); color: #fff;
    font-size: 9px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 2;
    opacity: 0; transform: scale(0.5);
    transition: all 0.16s ease;
  }
  .editing .sc-del { opacity: 1; transform: scale(1); }

  /* ── 自定义捷径弹窗 ── */
  .custom-overlay {
    position: fixed; inset: 0; z-index: 80;
    background: rgba(0,0,0,0.60);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .custom-overlay.show { opacity: 1; pointer-events: auto; }
  .custom-box {
    background: rgba(22,30,50,0.94);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px; padding: 28px 20px 24px;
    width: 620px; max-width: 94vw; max-height: 75vh; overflow-y: auto;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    transform: translateY(20px);
    transition: transform 0.35s cubic-bezier(0.22,0.61,0.36,1);
  }
  .custom-overlay.show .custom-box { transform: translateY(0); }
  .custom-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 2px 0; }
  .custom-item {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; user-select: none; transition: transform 0.18s ease;
    width: 72px; padding: 8px 2px; border-radius: 10px;
  }
  .custom-item:hover { transform: translateY(-2px); background: rgba(255,255,255,0.05); }
  .custom-item:active { transform: scale(0.93); }
  .custom-icon-wrap {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative;
    box-shadow: 0 3px 10px rgba(0,0,0,0.18);
    transition: box-shadow 0.18s ease;
  }
  .custom-item:hover .custom-icon-wrap { box-shadow: 0 5px 16px rgba(0,0,0,0.30); }
  .custom-icon-char { font-size: 19px; font-weight: 600; color: #fff; }
  .custom-name {
    font-size: 10px; color: rgba(255,255,255,0.70);
    text-align: center; max-width: 66px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .custom-del {
    position: absolute; top: -5px; right: -5px;
    width: 17px; height: 17px; border-radius: 50%;
    background: rgba(239,68,68,0.88); color: #fff;
    font-size: 9px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 2;
    opacity: 0; transform: scale(0.5);
    transition: all 0.16s ease;
  }
  .editing-custom .custom-del { opacity: 1; transform: scale(1); }

  /* ── 按钮 ── */
  .ico-btn {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s ease;
    color: rgba(255,255,255,0.60);
  }
  .ico-btn:hover { background: rgba(255,255,255,0.10); color: #fff; }

  /* ── 模态框 ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.50);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-box {
    background: rgba(22,30,46,0.94);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 18px; padding: 26px 24px; width: 370px; max-width: 92vw;
    box-shadow: 0 24px 64px rgba(0,0,0,0.45);
  }
  .modal-input {
    width: 100%; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
    padding: 10px 14px; color: #fff; font-size: 14px; outline: none;
    font-family: inherit; transition: border-color 0.2s;
  }
  .modal-input:focus { border-color: rgba(255,255,255,0.40); }
  .modal-input::placeholder { color: rgba(255,255,255,0.30); }

  /* ── 提示 ── */
  .clock-hint {
    position: absolute; bottom: -26px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.28); font-size: 10px;
    white-space: nowrap; opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .clock-wrap:hover .clock-hint { opacity: 1; }

  .editing .sc-add-wrap-custom { display: flex; }
  .sc-add-wrap-custom { display: none; justify-content: center; margin-top: 10px; }

  ::-webkit-scrollbar { width: 0; }
</style>
</head>

<script>
// ============ DOM ============
const $bgDef       = document.getElementById('bgDefault');
const $bgImg       = document.getElementById('bgImage');
const $bgBlur      = document.getElementById('bgBlur');
const $engineIcon  = document.getElementById('engineIcon');
const $imgBaidu    = document.getElementById('imgBaidu');
const $imgGoogle   = document.getElementById('imgGoogle');
const $searchIn    = document.getElementById('searchInput');
const $searchBox   = document.getElementById('searchBox');
const $tranCont    = document.getElementById('tranContent');
const $tranLoad    = document.getElementById('tranLoading');
const $tranLabel   = document.getElementById('tranLabel');
const $tranText    = document.getElementById('tranText');
const $time        = document.getElementById('timeDisplay');
const $date        = document.getElementById('dateDisplay');
const $toast       = document.getElementById('toast');
const $scPanel     = document.getElementById('scPanel');
const $scGrid      = document.getElementById('scGrid');
const $btnEditDef  = document.getElementById('btnEditDef');
const $customOverlay=document.getElementById('customOverlay');
const $customGrid  = document.getElementById('customGrid');
const $btnEditCustom=document.getElementById('btnEditCustom');
const $modal       = document.getElementById('modal');
const $mTitle      = document.getElementById('modalTitle');
const $mName       = document.getElementById('modalName');
const $mUrl        = document.getElementById('modalUrl');
const $mIdx        = document.getElementById('modalIdx');
const $mTarget     = document.getElementById('modalTarget');

// ============ 状态 ============
let engine = 'baidu';
let editDef = false;
let editCustom = false;
let tranTimer = null;
let tranCtrl = null;
let lastTran = '';
let defShortcuts = [];    // 默认底部面板
let customShortcuts = []; // 自定义弹窗面板

const DEF_SC = [
  { name:'GitHub', url:'https://github.com',      color:'#333' },
  { name:'B站',    url:'https://www.bilibili.com', color:'#fb7299' },
  { name:'知乎',   url:'https://www.zhihu.com',    color:'#0066ff' },
  { name:'微博',   url:'https://weibo.com',        color:'#e6162d' },
  { name:'豆瓣',   url:'https://www.douban.com',   color:'#00b51d' },
  { name:'V2EX',   url:'https://www.v2ex.com',     color:'#778899' },
  { name:'掘金',   url:'https://juejin.cn',        color:'#1e80ff' },
  { name:'百度',   url:'https://www.baidu.com',    color:'#2932e1' },
];

// ============ 背景 ============
function initBg() {
  const s = localStorage.getItem('sp_bg');
  s ? showBg(s) : showDefBg();
}
function showBg(url) {
  $bgDef.style.display = 'none';
  $bgImg.style.display = 'block';
  $bgImg.style.backgroundImage = `url(${url})`;
}
function showDefBg() {
  $bgImg.style.display = 'none';
  $bgDef.style.display = 'block';
  $bgImg.style.backgroundImage = '';
  localStorage.removeItem('sp_bg');
}
function handleBgUpload(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try { localStorage.setItem('sp_bg', ev.target.result); } catch(_) { localStorage.removeItem('sp_bg'); }
    showBg(ev.target.result); toast('背景已更新');
  };
  r.readAsDataURL(f); e.target.value = '';
}
function resetBg() { showDefBg(); toast('已恢复默认背景'); }

// ============ 背景模糊 + 缩放 ============
$searchIn.addEventListener('focus', () => { $bgBlur.classList.add('on'); $bgImg.classList.add('zoomed'); });
$searchIn.addEventListener('blur', () => {
  setTimeout(() => {
    if (document.activeElement !== $searchIn && !$searchIn.value.trim()) {
      $bgBlur.classList.remove('on'); $bgImg.classList.remove('zoomed');
    }
  }, 200);
});

// ============ 时钟 ============
function tick() {
  const n = new Date();
  $time.textContent = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  const ds = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  $date.textContent = `${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日 ${ds[n.getDay()]}`;
}

// ============ 搜索引擎 ============
function toggleEngine() {
  if (engine === 'baidu') {
    engine = 'google';
    $imgBaidu.classList.add('hidden'); $imgGoogle.classList.remove('hidden');
    $engineIcon.title = '当前：Google · 点击切换为百度';
  } else {
    engine = 'baidu';
    $imgGoogle.classList.add('hidden'); $imgBaidu.classList.remove('hidden');
    $engineIcon.title = '当前：百度 · 点击切换为 Google';
  }
  $searchIn.focus();
}
function doSearch() {
  const q = $searchIn.value.trim(); if (!q) return;
  window.open(
    engine === 'baidu'
      ? `https://www.baidu.com/s?wd=${encodeURIComponent(q)}`
      : `https://www.google.com/search?q=${encodeURIComponent(q)}`,
    '_blank'
  );
}

// ============ 搜索框 hover ============
$searchBox.addEventListener('mouseenter', () => {
  if (!$searchIn.value && document.activeElement !== $searchIn) $searchIn.placeholder = '';
});
$searchBox.addEventListener('mouseleave', () => {
  if (!$searchIn.value && document.activeElement !== $searchIn) $searchIn.placeholder = '搜索';
});
$searchIn.addEventListener('input', () => {
  $searchIn.classList.toggle('has-text', $searchIn.value.length > 0);
});

// ============ 翻译 ============
function detectScript(text) {
  const cleaned = text.replace(/[\s\d\p{P}]/gu, '');
  if (cleaned.length === 0) return 'zh';
  const patterns = {
    zh: /[\u4e00-\u9fff\u3400-\u4dbf\u{f900}-\u{faff}]/gu,
    ja: /[\u3040-\u309f\u30a0-\u30ff]/gu,
    ko: /[\uac00-\ud7af]/gu,
    ru: /[\u0400-\u04ff]/gu,
    ar: /[\u0600-\u06ff]/gu,
    th: /[\u0e00-\u0e7f]/gu,
  };
  for (const [lang, re] of Object.entries(patterns)) {
    const m = cleaned.match(re) || [];
    if (m.length / cleaned.length > 0.3) return lang;
  }
  return 'en';
}
async function translateAPI(text, from, to) {
  const u = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`;
  const r = await fetch(u, { signal: tranCtrl?.signal });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  if (d.responseStatus === 200 && d.responseData.translatedText) return d.responseData.translatedText;
  const ls = from === 'zh-CN' ? 'zh' : from;
  const lt = to === 'zh-CN' ? 'zh' : to;
  const fu = `https://lingva.ml/api/v1/${ls}/${lt}/${encodeURIComponent(text)}`;
  const fr = await fetch(fu, { signal: tranCtrl?.signal });
  if (!fr.ok) throw new Error('Lingva fail');
  const fd = await fr.json();
  if (fd.translation) return fd.translation;
  throw new Error('无翻译结果');
}
async function handleTranslate() {
  const q = $searchIn.value.trim();
  if (tranCtrl) { tranCtrl.abort(); tranCtrl = null; }
  if (!q) { $tranCont.classList.add('hidden'); $tranLoad.classList.add('hidden'); lastTran=''; return; }
  const lang = detectScript(q);
  let from, to, label;
  if (lang === 'zh') {
    from = 'zh-CN'; to = 'en'; label = '中文 → 英文';
  } else {
    const langMap = { en:'en', ja:'ja', ko:'ko', ru:'ru', ar:'ar', th:'th' };
    from = langMap[lang] || 'en';
    to = 'zh-CN';
    const langName = { en:'英文', ja:'日文', ko:'韩文', ru:'俄文', ar:'阿拉伯文', th:'泰文' };
    label = `${langName[from] || '其他'} → 中文`;
    if (!langMap[lang]) from = 'en';
  }
  $tranCont.classList.add('hidden'); $tranLoad.classList.remove('hidden'); tranTimer = null;
  const ctrl = new AbortController(); tranCtrl = ctrl;
  try {
    const r = await translateAPI(q, from, to);
    if (ctrl.signal.aborted) return;
    if (r && r.toLowerCase() !== q.toLowerCase()) {
      $tranText.textContent = r; $tranLabel.textContent = label; lastTran = r;
      $tranLoad.classList.add('hidden');
      $tranCont.classList.remove('tran-box'); void $tranCont.offsetWidth;
      $tranCont.classList.add('tran-box'); $tranCont.classList.remove('hidden');
    } else { $tranCont.classList.add('hidden'); $tranLoad.classList.add('hidden'); }
  } catch(e) {
    if (e.name !== 'AbortError') { $tranCont.classList.add('hidden'); $tranLoad.classList.add('hidden'); }
  }
}
function copyTran() { if (lastTran) navigator.clipboard?.writeText(lastTran).then(()=>toast('已复制')); }

// ============ 默认底部捷径 ============
function loadDefSC() {
  try { const r = localStorage.getItem('sp_sc'); defShortcuts = r ? JSON.parse(r) : [...DEF_SC]; }
  catch(_) { defShortcuts = [...DEF_SC]; }
}
function saveDefSC() { localStorage.setItem('sp_sc', JSON.stringify(defShortcuts)); }
function renderDefSC() {
  $scGrid.innerHTML = defShortcuts.map((s,i) => `
    <div class="sc-item" onclick="${editDef?`openEditDef(${i})`:`openUrl('${s.url.replace(/'/g,"\\'")}')`}" title="${editDef?'点击编辑':s.url}">
      <div class="sc-icon-wrap" style="background:${s.color}">
        <span class="sc-icon-char">${s.name.charAt(0)}</span>
        ${editDef?`<span class="sc-del" onclick="event.stopPropagation();delDefSC(${i})">&times;</span>`:''}
      </div>
      <span class="sc-name">${s.name}</span>
    </div>
  `).join('');
  $scPanel.classList.toggle('editing', editDef);
  $btnEditDef.innerHTML = editDef
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M20 6L9 17l-5-5"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="M15 5l4 4"/></svg>';
  $btnEditDef.title = editDef ? '完成编辑' : '编辑默认捷径';
}
function toggleEditDef() { editDef = !editDef; renderDefSC(); }
function openEditDef(i) {
  $mTitle.textContent='编辑默认捷径'; $mName.value=defShortcuts[i].name; $mUrl.value=defShortcuts[i].url;
  $mIdx.value=i; $mTarget.value='def';
  $modal.classList.remove('hidden'); setTimeout(()=>$mName.focus(), 100);
}
function delDefSC(i) { defShortcuts.splice(i,1); saveDefSC(); renderDefSC(); toast('已删除'); }

// ============ 自定义捷径弹窗 ============
function loadCustomSC() {
  try { const r = localStorage.getItem('sp_sc_custom'); customShortcuts = r ? JSON.parse(r) : []; }
  catch(_) { customShortcuts = []; }
}
function saveCustomSC() { localStorage.setItem('sp_sc_custom', JSON.stringify(customShortcuts)); }
function renderCustomSC() {
  if (customShortcuts.length === 0) {
    $customGrid.innerHTML = '<div class="text-white/25 text-xs py-8">暂无自定义捷径，点击下方 + 按钮添加</div>';
  } else {
    $customGrid.innerHTML = customShortcuts.map((s,i) => `
      <div class="custom-item" onclick="${editCustom?`openEditCustom(${i})`:`openUrl('${s.url.replace(/'/g,"\\'")}')`}" title="${editCustom?'点击编辑':s.url}">
        <div class="custom-icon-wrap" style="background:${s.color}">
          <span class="custom-icon-char">${s.name.charAt(0)}</span>
          ${editCustom?`<span class="custom-del" onclick="event.stopPropagation();delCustomSC(${i})">&times;</span>`:''}
        </div>
        <span class="custom-name">${s.name}</span>
      </div>
    `).join('');
  }
  $customOverlay.classList.toggle('editing-custom', editCustom);
  $btnEditCustom.innerHTML = editCustom
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M20 6L9 17l-5-5"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="M15 5l4 4"/></svg>';
  $btnEditCustom.title = editCustom ? '完成编辑' : '编辑自定义捷径';
}
function openCustomPanel() {
  $customOverlay.classList.add('show');
  renderCustomSC();
}
function closeCustomPanel() {
  $customOverlay.classList.remove('show');
  if (editCustom) { editCustom = false; renderCustomSC(); }
}
function toggleEditCustom() { editCustom = !editCustom; renderCustomSC(); }
function openCustomAdd() {
  $mTitle.textContent='添加自定义捷径'; $mName.value=''; $mUrl.value='';
  $mIdx.value='-1'; $mTarget.value='custom';
  $modal.classList.remove('hidden'); setTimeout(()=>$mName.focus(), 100);
}
function openEditCustom(i) {
  $mTitle.textContent='编辑自定义捷径'; $mName.value=customShortcuts[i].name;
  $mUrl.value=customShortcuts[i].url; $mIdx.value=i; $mTarget.value='custom';
  $modal.classList.remove('hidden'); setTimeout(()=>$mName.focus(), 100);
}
function delCustomSC(i) { customShortcuts.splice(i,1); saveCustomSC(); renderCustomSC(); toast('已删除'); }

// ============ 模态框通用 ============
function closeModal() { $modal.classList.add('hidden'); }
function saveShortcut() {
  const name=$mName.value.trim(), url=$mUrl.value.trim();
  if (!name||!url) { toast('请填写名称和网址'); return; }
  const colors=['#6366f1','#ec4899','#14b8a6','#f97316','#8b5cf6','#06b6d4','#ef4444','#22c55e','#3b82f6','#f59e0b','#e11d48','#0891b2'];
  const color=colors[Math.floor(Math.random()*colors.length)];
  const idx=parseInt($mIdx.value);
  const target=$mTarget.value;
  const list = target === 'custom' ? customShortcuts : defShortcuts;
  if (idx>=0 && idx<list.length) { list[idx]={...list[idx],name,url}; }
  else { list.push({name,url,color}); }
  if (target==='custom') { saveCustomSC(); renderCustomSC(); }
  else { saveDefSC(); renderDefSC(); }
  closeModal(); toast(idx>=0?'已更新':'已添加');
}

// ============ 通用 ============
function openUrl(url) {
  if (editDef || editCustom) return;
  if (!/^https?:\/\//i.test(url)) url='https://'+url;
  window.open(url, '_blank');
}
let tt;
function toast(m) {
  $toast.textContent=m; $toast.classList.add('opacity-100'); $toast.classList.remove('opacity-0');
  clearTimeout(tt); tt=setTimeout(()=>{$toast.classList.add('opacity-0');$toast.classList.remove('opacity-100')},1800);
}

// ============ 事件 ============
$searchIn.addEventListener('input', () => { clearTimeout(tranTimer); tranTimer=setTimeout(handleTranslate, 450); });
$searchIn.addEventListener('keydown', e => {
  if (e.key==='Enter') { clearTimeout(tranTimer); if (tranCtrl) { tranCtrl.abort(); tranCtrl=null; } doSearch(); }
});
document.addEventListener('keydown', e => {
  if (!editDef && !editCustom && !e.ctrlKey && !e.metaKey && !e.altKey && document.activeElement !== $searchIn) {
    const n = parseInt(e.key);
    if (n>=0 && n<=9 && n<defShortcuts.length) { e.preventDefault(); openUrl(defShortcuts[n].url); }
  }
  if ((e.ctrlKey||e.metaKey) && e.key==='o') { e.preventDefault(); document.getElementById('bgUpload').click(); }
  if ((e.ctrlKey||e.metaKey) && e.key==='k') { e.preventDefault(); $searchIn.focus(); $searchIn.select(); }
  if (e.key==='Escape') {
    if (!$modal.classList.contains('hidden')) { closeModal(); return; }
    if ($customOverlay.classList.contains('show')) { closeCustomPanel(); return; }
    if (editDef) toggleEditDef();
  }
  if ((e.ctrlKey||e.metaKey) && e.shiftKey && e.key==='E') { e.preventDefault(); toggleEngine(); }
});
$modal.addEventListener('click', e => { if (e.target===$modal) closeModal(); });
// 点击遮罩关闭弹窗
$customOverlay.addEventListener('click', function(e) {
  if (e.target === $customOverlay) closeCustomPanel();
});

// ============ 初始化 ============
initBg(); loadDefSC(); loadCustomSC(); renderDefSC(); tick();
setInterval(tick, 1000);
</script>
