<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
    overflow-x: hidden; overflow-y: auto;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
  }

  /* ── 背景 ── */
  .bg-gradient {
    position: fixed; inset: 0; z-index: -1;
    background: linear-gradient(170deg, #0e1625 0%, #111c30 20%, #162638 50%, #0f1a28 80%, #0a101c 100%);
  }
  .bg-image {
    position: fixed; inset: 0; z-index: 0;
    background-size: cover; background-position: center;
    transform: scale(1);
    transition: background-image 1.2s ease,
                transform 0.70s cubic-bezier(0.22,0.61,0.36,1);
  }
  .bg-image.zoomed { transform: scale(1.06); }
  .bg-blur {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    backdrop-filter: blur(0px);
    -webkit-backdrop-filter: blur(0px);
    background: rgba(0,0,0,0.12);
    transition: backdrop-filter 0.70s cubic-bezier(0.22,0.61,0.36,1),
                -webkit-backdrop-filter 0.70s cubic-bezier(0.22,0.61,0.36,1),
                background 0.70s ease;
  }
  .bg-blur.on {
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    background: rgba(0,0,0,0.33);
  }

  /* ── 搜索框 ── */
  .search-wrap {
    background: rgba(255,255,255,0.10);
    backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    transition: all 0.35s ease;
    width: 620px; max-width: 100%;
  }
  .search-wrap:hover {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.22);
    box-shadow: 0 6px 28px rgba(0,0,0,0.15);
  }
  .search-wrap:focus-within {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.30);
    box-shadow: 0 6px 36px rgba(0,0,0,0.22);
  }
  .search-input {
    background: transparent; border: none; outline: none;
    color: #fff; font-size: 15px; width: 100%; padding: 0 4px;
    font-family: inherit; text-align: center;
    transition: text-align 0.01s;
  }
  .search-input.has-text,
  .search-input:focus { text-align: left; }
  .search-input::placeholder { color: rgba(255,255,255,0.38); text-align: center; }
  .search-input:focus::placeholder { color: transparent; }

  /* ── 引擎图标 ── */
  .engine-icon {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; user-select: none;
    background: rgba(0,0,0,0.38); transition: transform 0.25s ease;
  }
  .engine-icon img { width: 28px; height: 28px; object-fit: contain; }
  .engine-icon:hover { transform: scale(1.12); }
  .engine-icon:active { transform: scale(0.92); }

  /* ── 翻译 ── */
  .tran-box { animation: slideUp 0.26s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .tran-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 14px; width: 560px; max-width: 100%;
  }

  /* ── 时钟 ── */
  .clock {
    text-shadow: 0 2px 36px rgba(0,0,0,0.35);
    user-select: none;
  }

  /* ── 默认底部捷径面板 ── */
  .sc-panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    padding: 14px 20px 24px;
    background: transparent;
  }
  .sc-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 0 0; }
  .sc-item {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    cursor: pointer; user-select: none; transition: transform 0.18s ease;
    width: 66px; padding: 5px 2px; border-radius: 10px;
  }
  .sc-item:hover { transform: translateY(-2px); background: rgba(255,255,255,0.05); }
  .sc-item:active { transform: scale(0.93); }
  .sc-icon-wrap {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,0.14);
    transition: box-shadow 0.18s ease;
  }
  .sc-item:hover .sc-icon-wrap { box-shadow: 0 4px 14px rgba(0,0,0,0.22); }
  .sc-icon-char { font-size: 16px; font-weight: 600; color: #fff; }
  .sc-name {
    font-size: 10px; color: rgba(255,255,255,0.65);
    text-align: center; max-width: 60px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .sc-del {
    position: absolute; top: -5px; right: -5px;
    width: 17px; height: 17px; border-radius: 50%;
    background: rgba(239,68,68,0.88); color: #fff;
    font-size: 9px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 2;
    opacity: 0; transform: scale(0.5);
    transition: all 0.16s ease;
  }
  .editing .sc-del { opacity: 1; transform: scale(1); }

  /* ── 自定义捷径弹窗 ── */
  .custom-overlay {
    position: fixed; inset: 0; z-index: 80;
    background: rgba(0,0,0,0.60);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .custom-overlay.show { opacity: 1; pointer-events: auto; }
  .custom-box {
    background: rgba(22,30,50,0.94);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px; padding: 28px 20px 24px;
    width: 620px; max-width: 94vw; max-height: 75vh; overflow-y: auto;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    transform: translateY(20px);
    transition: transform 0.35s cubic-bezier(0.22,0.61,0.36,1);
  }
  .custom-overlay.show .custom-box { transform: translateY(0); }
  .custom-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 2px 0; }
  .custom-item {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer; user-select: none; transition: transform 0.18s ease;
    width: 72px; padding: 8px 2px; border-radius: 10px;
  }
  .custom-item:hover { transform: translateY(-2px); background: rgba(255,255,255,0.05); }
  .custom-item:active { transform: scale(0.93); }
  .custom-icon-wrap {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative;
    box-shadow: 0 3px 10px rgba(0,0,0,0.18);
    transition: box-shadow 0.18s ease;
  }
  .custom-item:hover .custom-icon-wrap { box-shadow: 0 5px 16px rgba(0,0,0,0.30); }
  .custom-icon-char { font-size: 19px; font-weight: 600; color: #fff; }
  .custom-name {
    font-size: 10px; color: rgba(255,255,255,0.70);
    text-align: center; max-width: 66px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .custom-del {
    position: absolute; top: -5px; right: -5px;
    width: 17px; height: 17px; border-radius: 50%;
    background: rgba(239,68,68,0.88); color: #fff;
    font-size: 9px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 2;
    opacity: 0; transform: scale(0.5);
    transition: all 0.16s ease;
  }
  .editing-custom .custom-del { opacity: 1; transform: scale(1); }

  /* ── 按钮 ── */
  .ico-btn {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s ease;
    color: rgba(255,255,255,0.60);
  }
  .ico-btn:hover { background: rgba(255,255,255,0.10); color: #fff; }

  /* ── 模态框 ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.50);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-box {
    background: rgba(22,30,46,0.94);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 18px; padding: 26px 24px; width: 370px; max-width: 92vw;
    box-shadow: 0 24px 64px rgba(0,0,0,0.45);
  }
  .modal-input {
    width: 100%; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
    padding: 10px 14px; color: #fff; font-size: 14px; outline: none;
    font-family: inherit; transition: border-color 0.2s;
  }
  .modal-input:focus { border-color: rgba(255,255,255,0.40); }
  .modal-input::placeholder { color: rgba(255,255,255,0.30); }

  .editing .sc-add-wrap-custom { display: flex; }
  .sc-add-wrap-custom { display: none; justify-content: center; margin-top: 10px; }


  /* ── 便签 ── */
  .note-wrapper {
    position: fixed; z-index: 200;
    min-width: 240px; min-height: 160px;
    border-radius: 14px;
    background: rgba(25,30,48,0.94);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 8px 36px rgba(0,0,0,0.45);
    display: flex; flex-direction: column;
    overflow: hidden;
    transition: box-shadow 0.2s ease;
  }
  .note-wrapper.front { z-index: 999; box-shadow: 0 14px 48px rgba(0,0,0,0.55); }
  .note-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 10px 7px 14px; cursor: move; user-select: none;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    background: rgba(255,255,255,0.03);
  }
  .note-title { font-size: 11px; color: rgba(255,255,255,0.35); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
  .note-header-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
  .note-header-actions button {
    width: 26px; height: 26px; border-radius: 50%; border: none;
    background: transparent; color: rgba(255,255,255,0.35);
    cursor: pointer; font-size: 13px; display: flex; align-items: center;
    justify-content: center; transition: all 0.15s;
  }
  .note-btn-upload:hover { background: rgba(59,130,246,0.35); color: #fff; }
  .note-btn-archive:hover { background: rgba(34,197,94,0.35); color: #fff; }
  .note-btn-close:hover { background: rgba(239,68,68,0.5); color: #fff; }
  .note-body {
    flex: 1; padding: 10px 14px; overflow-y: auto;
    color: rgba(255,255,255,0.80); font-size: 13px;
    outline: none; line-height: 1.7; min-height: 100px;
    word-break: break-word;
  }
  .note-body img { max-width: 100%; border-radius: 8px; margin: 6px 0; display: block; }
  .note-body:empty::before {
    content: '输入内容，支持粘贴图片…'; color: rgba(255,255,255,0.18);
  }
  .note-resize {
    position: absolute; bottom: 2px; right: 2px;
    width: 18px; height: 18px; cursor: nwse-resize;
    background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.12) 50%);
    border-radius: 0 0 10px 0;
  }


  /* ── 背景下拉菜单 ── */
  .bg-dropdown {
    position: absolute; top: 44px; right: 0; z-index: 60;
    min-width: 150px;
    background: rgba(22,30,50,0.96);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 6px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    animation: dropIn 0.18s ease;
  }
  @keyframes dropIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .bg-dropdown button {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 9px 12px; border: none; border-radius: 8px;
    background: transparent; color: rgba(255,255,255,0.75);
    font-size: 13px; cursor: pointer; font-family: inherit;
    transition: background 0.15s; white-space: nowrap;
  }
  .bg-dropdown button:hover { background: rgba(255,255,255,0.08); color: #fff; }

  /* ── 便签历史面板 ── */
  .notes-history-overlay {
    position: fixed; inset: 0; z-index: 150;
    background: rgba(0,0,0,0.50);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .notes-history-overlay.show { opacity: 1; pointer-events: auto; }
  .notes-history-box {
    background: rgba(22,30,50,0.96);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px; padding: 24px 20px;
    width: 520px; max-width: 92vw; max-height: 70vh;
    display: flex; flex-direction: column;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }
  .notes-history-list {
    flex: 1; overflow-y: auto; margin: 12px 0 8px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .notes-history-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; border-radius: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.05);
    transition: background 0.15s;
  }
  .notes-history-item:hover { background: rgba(255,255,255,0.08); }
  .notes-history-item.longterm {
    background: rgba(249,115,22,0.06);
    border-color: rgba(249,115,22,0.12);
  }
  .notes-history-item.longterm:hover { background: rgba(249,115,22,0.12); }
  .notes-history-section-title {
    color: rgba(255,255,255,0.25); font-size: 10px;
    padding: 2px 0 4px; margin-bottom: 2px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .notes-history-section-title.longterm { color: rgba(249,115,22,0.5); }
  .btn-history-longterm {
    background: rgba(249,115,22,0.12); color: rgba(249,115,22,0.7);
    font-size: 10px; padding: 2px 8px; border-radius: 10px; border: none;
    cursor: pointer; white-space: nowrap;
    transition: all 0.15s;
  }
  .btn-history-longterm:hover { background: rgba(249,115,22,0.3); }
  .btn-history-longterm.active { background: rgba(249,115,22,0.3); color: rgba(249,115,22,0.9); }
  /* ── 删除确认弹窗 ── */
  .confirm-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
  }
  .confirm-box {
    background: rgba(22,30,50,0.96);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px; padding: 20px 24px; width: 340px; max-width: 90vw;
    box-shadow: 0 20px 48px rgba(0,0,0,0.55);
    text-align: center;
  }
  .confirm-box p { color: rgba(255,255,255,0.65); font-size: 13px; margin: 0 0 16px; }
  .confirm-box .confirm-btns { display: flex; gap: 10px; justify-content: center; }
  .confirm-box .confirm-btns button {
    padding: 8px 20px; border-radius: 10px; border: none;
    font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .confirm-btn-cancel { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); }
  .confirm-btn-cancel:hover { background: rgba(255,255,255,0.12); }
  .confirm-btn-delete { background: rgba(239,68,68,0.5); color: #fff; }
  .confirm-btn-delete:hover { background: rgba(239,68,68,0.7); }

  /* ── 同步面板 ── */
  .sync-overlay {
    position: fixed; inset: 0; z-index: 250;
    background: rgba(0,0,0,0.60);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .sync-overlay.show { opacity: 1; pointer-events: auto; }
  .sync-panel {
    background: rgba(22,30,50,0.94);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px; padding: 28px 24px 20px;
    width: 440px; max-width: 94vw; max-height: 82vh; overflow-y: auto;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    transform: translateY(20px);
    transition: transform 0.35s cubic-bezier(0.22,0.61,0.36,1);
  }
  .sync-overlay.show .sync-panel { transform: translateY(0); }
  .sync-code-box {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 10px 14px; border-radius: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    margin: 12px 0;
  }
  .sync-code-text {
    font-size: 20px; font-weight: 600; color: #a5b4fc;
    letter-spacing: 0.12em; user-select: all;
  }
  .sync-qr-wrap { display: flex; justify-content: center; margin: 14px 0; }
  .sync-qr-wrap canvas, .sync-qr-wrap img { border-radius: 12px; }
  .sync-status-dot {
    width: 7px; height: 7px; border-radius: 50%; display: inline-block;
  }
  .sync-status-dot.on { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.5); }
  .sync-status-dot.off { background: rgba(255,255,255,0.25); }
  .notes-history-preview {
    flex: 1; min-width: 0;
    color: rgba(255,255,255,0.55); font-size: 12px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .notes-history-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .notes-history-actions button {
    width: 28px; height: 28px; border-radius: 50%; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; font-size: 12px;
  }
  .btn-history-restore {
    background: rgba(34,197,94,0.15); color: rgba(34,197,94,0.85);
  }
  .btn-history-restore:hover { background: rgba(34,197,94,0.35); }
  .btn-history-delete {
    background: rgba(239,68,68,0.12); color: rgba(239,68,68,0.75);
  }
  .btn-history-delete:hover { background: rgba(239,68,68,0.35); }
  .note-archive-badge {
    font-size: 10px; color: rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.04); padding: 2px 8px;
    border-radius: 10px; flex-shrink: 0;
  }


  /* ── 便签内文件/图片删除按钮 ── */
  .note-img-wrap {
    position: relative; display: inline-block; max-width: 100%;
  }
  .note-img-wrap img {
    max-width: 100%; border-radius: 8px; margin: 4px 0; display: block;
  }
  .note-file-wrap {
    position: relative; display: inline-block; max-width: 100%;
  }
  .note-item-down {
    position: absolute; top: -4px; right: 20px;
    width: 20px; height: 20px; border-radius: 50%;
    border: none; background: rgba(59,130,246,0.82); color: #fff;
    font-size: 11px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1; opacity: 0; transition: opacity 0.15s;
    z-index: 5; padding: 0;
  }
  .note-item-del {
    position: absolute; top: -4px; right: -4px;
    width: 20px; height: 20px; border-radius: 50%;
    border: none; background: rgba(239,68,68,0.82); color: #fff;
    font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1; opacity: 0; transition: opacity 0.15s;
    z-index: 5; padding: 0;
  }
  .note-img-wrap:hover .note-item-down,
  .note-img-wrap:hover .note-item-del,
  .note-file-wrap:hover .note-item-down,
  .note-file-wrap:hover .note-item-del { opacity: 1; }

  ::-webkit-scrollbar { width: 0; }

  /* ═══ 移动端适配 ═══ */
  @media (max-width: 768px) {
    /* 顶部工具栏 */
    .fixed.top-0 { padding: 10px 8px !important; gap: 0 !important; }
    .ico-btn { width: 32px; height: 32px; }

    /* 时钟 */
    .clock { font-size: 48px !important; }

    /* 搜索框 */
    .search-wrap { width: 100% !important; margin: 0 8px; border-radius: 14px; }
    .search-input { font-size: 14px; }
    .engine-icon { width: 28px; height: 28px; }
    .engine-icon img { width: 26px; height: 26px; }

    /* 翻译 */
    .tran-card { width: calc(100% - 16px) !important; margin: 0 8px; }

    /* 主体上边距 */
    .relative.z-10 { padding-top: 12vh !important; padding-left: 12px; padding-right: 12px; }

    /* 底部捷径面板 */
    .sc-panel { padding: 8px 6px 16px; }
    .sc-item { width: 56px; padding: 4px 1px; }
    .sc-icon-wrap { width: 34px; height: 34px; border-radius: 9px; }
    .sc-icon-char { font-size: 14px; }
    .sc-name { font-size: 9px; max-width: 50px; }

    /* 便签 - 移动端全宽 */
    .note-wrapper {
      min-width: auto !important; width: calc(100vw - 16px) !important;
      left: 8px !important; right: 8px;
      max-height: 55vh;
    }
    .note-header { padding: 8px 8px 8px 12px; }
    .note-header-actions button {
      width: 30px; height: 30px; font-size: 14px;
    }
    .note-title { font-size: 10px; }
    .note-body { font-size: 14px; padding: 10px 14px; min-height: 80px; }
    .note-resize { width: 24px; height: 24px; }

    /* 便签历史面板 */
    .notes-history-box {
      width: calc(100vw - 16px) !important; max-width: none;
      max-height: 80vh; padding: 18px 12px; border-radius: 16px;
    }
    .notes-history-item {
      flex-wrap: wrap; gap: 4px 6px; padding: 8px 10px;
    }
    .notes-history-preview { font-size: 11px; flex-basis: 100%; order: 3; }
    .notes-history-actions { order: 4; margin-left: auto; }
    .note-archive-badge { font-size: 9px; padding: 1px 6px; }
    .notes-history-item span[style] { font-size: 9px !important; order: 2; }
    .history-item-check { order: 0; }
    .notes-history-section-title { font-size: 9px; }

    /* 自定义捷径弹窗 */
    .custom-box {
      width: calc(100vw - 16px) !important; max-width: none;
      max-height: 80vh; padding: 20px 12px 16px; border-radius: 16px;
    }
    .custom-item { width: 64px; padding: 6px 1px; }
    .custom-icon-wrap { width: 40px; height: 40px; border-radius: 10px; }
    .custom-icon-char { font-size: 16px; }

    /* 同步面板 */
    .sync-panel {
      width: calc(100vw - 16px) !important; max-width: none;
      max-height: 85vh; padding: 20px 16px 16px; border-radius: 16px;
    }
    .sync-code-text { font-size: 16px; letter-spacing: 0.08em; }

    /* 模态框 */
    .modal-box { width: calc(100vw - 32px) !important; padding: 20px 18px; }

    /* 确认弹窗 */
    .confirm-box { width: calc(100vw - 40px) !important; }

    /* Toast */
    #toast { bottom: 100px; font-size: 11px; padding: 8px 16px; }

    /* 下拉菜单 */
    .bg-dropdown { min-width: 130px; right: -8px; }
    .bg-dropdown button { font-size: 12px; padding: 8px 10px; }
  }

  /* 超小屏 (≤400px) */
  @media (max-width: 400px) {
    .clock { font-size: 40px !important; }
    .search-wrap { margin: 0 4px; }
    .sc-item { width: 48px; }
    .sc-icon-wrap { width: 30px; height: 30px; border-radius: 8px; }
    .sc-icon-char { font-size: 13px; }
    .sc-name { font-size: 8px; max-width: 44px; }
    .ico-btn { width: 28px; height: 28px; }
    .fixed.top-0 { padding: 8px 6px !important; }
    .notes-history-actions button { width: 24px; height: 24px; font-size: 10px; }
    .btn-history-longterm { font-size: 9px; padding: 2px 6px; }
  }
</style>
</head>

          <div class="text-white/78 text-xs leading-relaxed break-words" id="tranText"></div>
        </div>
        <button class="flex-shrink-0 opacity-35 hover:opacity-75 transition-opacity" onclick="copyTran()" title="复制">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="12" height="12" style="color:rgba(255,255,255,0.7)"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>

      </div>
    </div>

<!-- ═══ 默认捷径面板（底部常驻） ═══ -->
<div class="sc-panel" id="scPanel">
  <div class="sc-grid" id="scGrid"></div>
</div>

<!-- ═══ 自定义捷径弹窗（点击时钟弹出） ═══ -->
<div class="custom-overlay" id="customOverlay">
  <div class="custom-box">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-white text-base font-medium">我的快捷方式</h3>
      <div class="flex items-center gap-1.5">
        <button class="ico-btn" id="btnEditCustom" onclick="toggleEditCustom()" title="编辑">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="M15 5l4 4"/></svg>
        </button>
        <button class="ico-btn" onclick="closeCustomPanel()" title="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div class="custom-grid" id="customGrid">
      <div class="text-white/25 text-xs py-8">暂无自定义捷径，点击下方按钮添加</div>
    </div>
    <div class="flex justify-center mt-5">
      <button class="ico-btn border border-dashed border-white/20 w-10 h-10" onclick="openCustomAdd()" title="添加自定义捷径">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="color:rgba(255,255,255,0.55)"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ═══ 添加/编辑模态框 ═══ -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal-box">
    <h3 class="text-white text-base font-medium mb-5" id="modalTitle">添加快捷方式</h3>
    <div class="mb-3.5">
      <label class="block text-white/45 text-xs mb-1.5 ml-0.5">名称</label>
      <input type="text" class="modal-input" id="modalName" placeholder="如：GitHub" maxlength="10">
    </div>
    <div class="mb-5">
      <label class="block text-white/45 text-xs mb-1.5 ml-0.5">网址</label>
      <input type="text" class="modal-input" id="modalUrl" placeholder="如：https://github.com">
    </div>
    <div class="flex gap-3 justify-end">
      <button class="px-5 py-2.5 rounded-lg text-white/50 text-sm hover:bg-white/8 transition-colors" onclick="closeModal()">取消</button>
      <button class="px-5 py-2.5 rounded-lg bg-white/12 text-white text-sm hover:bg-white/22 transition-colors font-medium" onclick="saveShortcut()">保存</button>
    </div>
    <input type="hidden" id="modalIdx" value="-1">
    <input type="hidden" id="modalTarget" value="def">
  </div>
</div>

<!-- ═══ Toast ═══ -->
<div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50
  bg-white/10 backdrop-blur-lg text-white text-xs px-4 py-2 rounded-full
  opacity-0 transition-opacity duration-300 pointer-events-none"></div>

<!-- ═══ 便签容器 ═══ -->
<div id="notesContainer"></div>

<!-- ═══ 便签历史面板 ═══ -->
<div class="notes-history-overlay" id="notesHistoryOverlay">
  <div class="notes-history-box">
    <div class="flex items-center justify-between mb-1">
      <div class="flex items-center gap-3">
        <h3 class="text-white text-base font-medium">已归档的便签</h3>
        <label class="flex items-center gap-1.5 cursor-pointer select-none" id="selectAllLabel" style="display:none">
          <input type="checkbox" id="selectAllNotes" onchange="toggleSelectAllNotes()" style="accent-color:#6366f1;width:14px;height:14px;cursor:pointer">
          <span style="color:rgba(255,255,255,0.35);font-size:11px">全选</span>
        </label>
      </div>
      <div class="flex items-center gap-1.5">
        <button class="ico-btn" id="btnSyncHistory" onclick="toggleSyncPanel()" title="云端同步" style="color:rgba(255,255,255,0.45)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15"><path d="M21.5 2v6h-6M2.5 22v-6h6"/><path d="M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
        </button>
        <button class="ico-btn" id="btnBatchDel" onclick="batchDeleteNotes()" title="批量删除" style="display:none;width:auto;padding:0 10px;border-radius:20px;font-size:11px;color:rgba(239,68,68,0.7)">
          删除选中
        </button>
        <button class="ico-btn" onclick="toggleNotesHistory()" title="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div class="notes-history-list" id="notesHistoryList">
      <div class="text-white/20 text-xs text-center py-10">暂无已归档的便签</div>
    </div>

// ============ DOM ============

// ============ 状态 ============

const DEF_SC = [
  { name:'GitHub', url:'https://github.com',      color:'#333' },
  { name:'B站',    url:'https://www.bilibili.com', color:'#fb7299' },
  { name:'知乎',   url:'https://www.zhihu.com',    color:'#0066ff' },

];

// ============ 背景 ============
let bgMode = 'bing'; // 'bing' | 'custom' | 'default'
const BING_MIRROR = 'https://api.dujin.org/bing/1920.php';

async function initBg() {
  const mode = localStorage.getItem('sp_bg_mode') || 'bing';
  bgMode = mode;
  if (mode === 'custom') {
    const s = localStorage.getItem('sp_bg');
    if (s) { showBg(s, false); return; }
    // custom mode set but data lost → fallback to bing
    localStorage.setItem('sp_bg_mode', 'bing'); bgMode = 'bing';
  }
  if (mode === 'bing') {
    applyBingBg(); return;
  }
  showDefBg();
}

function applyBingBg() {
  // CSS background-image loads cross-origin without CORS issues
  showBg(BING_MIRROR, true);
  const today = new Date().toDateString();
  localStorage.setItem('sp_bing_date', today);
}

async function fetchBing() {
  // Verify the mirror is reachable via Image preload
  // (CSS background will load it anyway, but we confirm first)
  return new Promise((resolve) => {
    const img = new Image();
    const timer = setTimeout(() => {
      img.src = '';
      resolve(false);
    }, 8000);
    img.onload = () => {
      clearTimeout(timer);
      resolve(true);
    };
    img.onerror = () => {
      clearTimeout(timer);
      // Try cn.bing.com direct as fallback
      const img2 = new Image();
      const timer2 = setTimeout(() => { img2.src = ''; resolve(false); }, 8000);
      img2.onload = () => { clearTimeout(timer2); resolve(true); };
      img2.onerror = () => { clearTimeout(timer2); resolve(false); };
      img2.src = 'https://cn.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1';
    };
    img.src = BING_MIRROR;
  });
}

function showBg(url, isBing) {
  $bgDef.style.display = 'none';
  $bgImg.style.display = 'block';
  $bgImg.style.backgroundImage = `url(${url})`;
}

function showDefBg() {
  $bgImg.style.display = 'none';
  $bgDef.style.display = 'block';
  $bgImg.style.backgroundImage = '';
}

function compressImage(dataUri, maxW, quality, callback) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    let w = img.naturalWidth, h = img.naturalHeight;
    if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    const compressed = canvas.toDataURL('image/jpeg', quality);
    callback(compressed);
  };
  img.onerror = () => callback(null);
  img.src = dataUri;
}

function handleBgUpload(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    const rawUri = ev.target.result;
    bgMode = 'custom';
    localStorage.setItem('sp_bg_mode', 'custom');

    // First try to save compressed version (resize to 1920px, JPEG Q=0.7)
    compressImage(rawUri, 1920, 0.7, (compressed) => {
      if (compressed) {
        try {
          localStorage.setItem('sp_bg', compressed);
          showBg(compressed, false);
          toast('背景已更新');
          return;
        } catch(_) {}
      }
      // Compression failed or still too large → try lower quality
      compressImage(rawUri, 1600, 0.5, (compressed2) => {
        if (compressed2) {
          try {
            localStorage.setItem('sp_bg', compressed2);
            showBg(compressed2, false);
            toast('背景已更新（高压缩）');
            return;
          } catch(_) {}
        }
        // All failed → just show without persistence
        showBg(rawUri, false);
        toast('图片过大无法持久化，仅本次有效');
      });
    });
  };
  r.readAsDataURL(f); e.target.value = '';
}

function toggleBgMenu() {

}

// ============ 搜索引擎 ============
function toggleEngine() {

$searchBox.addEventListener('mouseenter', () => {

// ============ 翻译 ============
function detectScript(text) {
  const cleaned = text.replace(/[\s\d\p{P}]/gu, '');
  if (cleaned.length === 0) return 'zh';
  const patterns = {
    zh: /[\u4e00-\u9fff\u3400-\u4dbf\u{f900}-\u{faff}]/gu,
    ja: /[\u3040-\u309f\u30a0-\u30ff]/gu,
    ko: /[\uac00-\ud7af]/gu,
    ru: /[\u0400-\u04ff]/gu,
    ar: /[\u0600-\u06ff]/gu,
    th: /[\u0e00-\u0e7f]/gu,
  };
  for (const [lang, re] of Object.entries(patterns)) {
    const m = cleaned.match(re) || [];
    if (m.length / cleaned.length > 0.3) return lang;
  }
  return 'en';
}
async function translateAPI(text, from, to) {
  const u = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`;
  const r = await fetch(u, { signal: tranCtrl?.signal });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  if (d.responseStatus === 200 && d.responseData.translatedText) return d.responseData.translatedText;
  const ls = from === 'zh-CN' ? 'zh' : from;
  const lt = to === 'zh-CN' ? 'zh' : to;
  const fu = `https://lingva.ml/api/v1/${ls}/${lt}/${encodeURIComponent(text)}`;
  const fr = await fetch(fu, { signal: tranCtrl?.signal });
  if (!fr.ok) throw new Error('Lingva fail');
  const fd = await fr.json();
  if (fd.translation) return fd.translation;
  throw new Error('无翻译结果');
}
async function handleTranslate() {
  const q = $searchIn.value.trim();
  if (tranCtrl) { tranCtrl.abort(); tranCtrl = null; }
  if (!q) { $tranCont.classList.add('hidden'); $tranLoad.classList.add('hidden'); lastTran=''; return; }
  const lang = detectScript(q);
  let from, to, label;
  if (lang === 'zh') {
    from = 'zh-CN'; to = 'en'; label = '中文 → 英文';
  } else {
    const langMap = { en:'en', ja:'ja', ko:'ko', ru:'ru', ar:'ar', th:'th' };
    from = langMap[lang] || 'en';
    to = 'zh-CN';
    const langName = { en:'英文', ja:'日文', ko:'韩文', ru:'俄文', ar:'阿拉伯文', th:'泰文' };
    label = `${langName[from] || '其他'} → 中文`;
    if (!langMap[lang]) from = 'en';
  }
  $tranCont.classList.add('hidden'); $tranLoad.classList.remove('hidden'); tranTimer = null;
  const ctrl = new AbortController(); tranCtrl = ctrl;
  try {
    const r = await translateAPI(q, from, to);
    if (ctrl.signal.aborted) return;
    if (r && r.toLowerCase() !== q.toLowerCase()) {
      $tranText.textContent = r; $tranLabel.textContent = label; lastTran = r;
      $tranLoad.classList.add('hidden');
      $tranCont.classList.remove('tran-box'); void $tranCont.offsetWidth;
      $tranCont.classList.add('tran-box'); $tranCont.classList.remove('hidden');
    } else { $tranCont.classList.add('hidden'); $tranLoad.classList.add('hidden'); }
  } catch(e) {
    if (e.name !== 'AbortError') { $tranCont.classList.add('hidden'); $tranLoad.classList.add('hidden'); }
  }
}
function copyTran() { if (lastTran) navigator.clipboard?.writeText(lastTran).then(()=>toast('已复制')); }

// ============ 模态框通用 ============
function closeModal() { $modal.classList.add('hidden'); }
function saveShortcut() {
  const name=$mName.value.trim(), url=$mUrl.value.trim();
  if (!name||!url) { toast('请填写名称和网址'); return; }
  const colors=['#6366f1','#ec4899','#14b8a6','#f97316','#8b5cf6','#06b6d4','#ef4444','#22c55e','#3b82f6','#f59e0b','#e11d48','#0891b2'];
  const color=colors[Math.floor(Math.random()*colors.length)];
  const idx=parseInt($mIdx.value);
  const target=$mTarget.value;
  const list = target === 'custom' ? customShortcuts : defShortcuts;
  if (idx>=0 && idx<list.length) { list[idx]={...list[idx],name,url}; }
  else { list.push({name,url,color}); }
  if (target==='custom') { saveCustomSC(); renderCustomSC(); }
  else { saveDefSC(); renderDefSC(); }
  closeModal(); toast(idx>=0?'已更新':'已添加');
}

// ============ 通用 ============
function openUrl(url) {
  if (editDef || editCustom) return;
  if (!/^https?:\/\//i.test(url)) url='https://'+url;
  window.open(url, '_blank');
}
let tt;
function toast(m) {
  $toast.textContent=m; $toast.classList.add('opacity-100'); $toast.classList.remove('opacity-0');
  clearTimeout(tt); tt=setTimeout(()=>{$toast.classList.add('opacity-0');$toast.classList.remove('opacity-100')},1800);
}

// ============ 便签功能 ============
let notes = [];
let notesArchived = [];
let noteIdCounter = 0;
let noteZ = 200;
let dragState = null;

function loadNotes() {
  try { const r = localStorage.getItem('sp_notes'); notes = r ? JSON.parse(r) : []; }
  catch(_) { notes = []; }
  try { const r = localStorage.getItem('sp_notes_archived'); notesArchived = r ? JSON.parse(r) : []; }
  catch(_) { notesArchived = []; }
  const allIds = [...notes, ...notesArchived].map(n => n.id||0);
  noteIdCounter = allIds.length ? Math.max(...allIds) : 0;
  // Only render active (non-archived) notes
  renderAllNotes();
  // Init sync after local load
  initSync();
}

function saveNotes() {
  // Sync DOM state into notes array
  document.querySelectorAll('.note-wrapper').forEach(el => {
    const id = parseInt(el.dataset.noteId);
    const body = el.querySelector('.note-body');
    const note = notes.find(n => n.id === id);
    if (note && body) note.content = body.innerHTML;
  });
  try { localStorage.setItem('sp_notes', JSON.stringify(notes)); } catch(_) {
    toast('存储空间不足，请清理部分便签');
  }
  // 活跃便签不同步到云端，仅本地保存
}
function saveArchived() {
  try { localStorage.setItem('sp_notes_archived', JSON.stringify(notesArchived)); } catch(_) {}
  // Push to cloud
  pushToCloud();
}

function createNote(x, y) {
  noteIdCounter++;
  const isMobile = window.innerWidth <= 768;
  const note = {
    id: noteIdCounter,
    x: x || (isMobile ? 8 : 100 + Math.random() * 300),
    y: y || (isMobile ? 80 : 80 + Math.random() * 300),
    w: isMobile ? Math.min(window.innerWidth - 16, 400) : 280,
    h: isMobile ? 200 : 220,
    content: '',
    updatedAt: Date.now()
  };
  notes.push(note);
  renderNote(note);
  saveNotes();
  toast('便签已创建');
}

function updateNoteTitle(id) {
  const note = notes.find(n => n.id === id);
  if (!note) return;
  const el = document.querySelector(`.note-wrapper[data-note-id="${id}"]`);
  if (!el) return;
  const body = el.querySelector('.note-body');
  if (body) note.content = body.innerHTML;
  const titleEl = document.getElementById('note-title-' + id);
  if (titleEl) titleEl.textContent = generateNoteName(note);
}

function generateNoteName(note) {
  const tmp = document.createElement('div');
  tmp.innerHTML = note.content || '';

  // Check for images FIRST (before text, otherwise × button text wins)
  const imgs = tmp.querySelectorAll('img');
  if (imgs.length > 0) {
    const alt = imgs[0].alt || '';
    const src = imgs[0].src || '';
    // Get extension from data URI or alt
    let ext = '';
    const mimeMatch = src.match(/^data:image\/([^;]+)/);
    if (mimeMatch) ext = mimeMatch[1].toUpperCase();
    // If alt is a filename (from drop), use it; otherwise use "图片"
    let name = (alt && alt !== 'pasted') ? alt : ('图片' + (ext ? '.' + ext.toLowerCase() : ''));
    // Prefix with image type
    const label = (ext ? ext + '-' : '图片-');
    const fullName = label + name;
    return fullName.length > 18 ? fullName.substring(0, 18) + '…' : fullName;
  }

  // Check for file attachments SECOND
  const files = tmp.querySelectorAll('.file-attach a');
  if (files.length > 0) {
    const fileName = files[0].getAttribute('download') || files[0].textContent || '文件';
    const ext = fileName.includes('.') ? fileName.split('.').pop().toUpperCase() : '';
    const baseName = fileName.includes('.') ? fileName.substring(0, fileName.lastIndexOf('.')) : fileName;
    const shortBase = baseName.length > 8 ? baseName.substring(0, 8) + '…' : baseName;
    return (ext ? ext + '-' : '文件-') + shortBase;
  }

  // Text content LAST — exclude delete button text
  const dels = tmp.querySelectorAll('.note-item-del');
  dels.forEach(d => d.remove());
  const text = tmp.textContent || tmp.innerText || '';
  const trimmed = text.replace(/\s+/g, ' ').trim();

  if (trimmed) {
    return '文本-' + (trimmed.length > 5 ? trimmed.substring(0, 5) + '…' : trimmed);
  }

  return '空白便签';
}

// Generate HTML for an image attachment with download button
function noteImgHtml(dataUri, fileName) {
  const safeName = fileName.replace(/"/g, '&quot;');
  return `<span class="note-img-wrap"><img src="${dataUri}" alt="${safeName}" draggable="true"><button class="note-item-down" data-uri="${dataUri}" data-filename="${safeName}" title="下载">↓</button><button class="note-item-del">×</button></span>`;
}
// Generate HTML for a file attachment with download button
function noteFileHtml(dataUri, fileName, sizeStr) {
  const safeName = fileName.replace(/"/g, '&quot;');
  return `<span class="note-file-wrap"><div class="file-attach" style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:rgba(255,255,255,0.06);border-radius:8px;margin:3px 0;font-size:12px;color:rgba(255,255,255,0.6);max-width:100%" draggable="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="12" height="12" style="flex-shrink:0"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
    <span style="color:rgba(255,255,255,0.7);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${safeName}</span>
    <span style="opacity:0.4;flex-shrink:0">${sizeStr}</span>
  </div><button class="note-item-down" data-uri="${dataUri}" data-filename="${safeName}" title="下载">↓</button><button class="note-item-del">×</button></span>`;
}

function renderNote(note) {
  const el = document.createElement('div');
  el.className = 'note-wrapper';
  el.dataset.noteId = note.id;
  el.style.left = note.x + 'px';
  el.style.top = note.y + 'px';
  el.style.width = note.w + 'px';
  el.style.height = note.h + 'px';
  el.style.zIndex = noteZ++;
  el.innerHTML = `
    <div class="note-header" data-action="drag">
      <span class="note-title" id="note-title-${note.id}">${generateNoteName(note)}</span>
      <div class="note-header-actions">
        <button class="note-btn-upload" title="上传文件">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <button class="note-btn-archive" title="归档到历史">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
        </button>
        <button class="note-btn-close" title="关闭（不归档）">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div class="note-body" contenteditable="true" spellcheck="false">${note.content}</div>
    <div class="note-resize" data-action="resize"></div>
    <input type="file" class="note-file-input hidden" multiple accept="*/*">`;

  const header = el.querySelector('.note-header');
  const body = el.querySelector('.note-body');
  const resize = el.querySelector('.note-resize');
  const uploadBtn = el.querySelector('.note-btn-upload');
  const archiveBtn = el.querySelector('.note-btn-archive');
  const closeBtn = el.querySelector('.note-btn-close');
  const fileInput = el.querySelector('.note-file-input');

  // Bring to front on interaction
  const bringToFront = () => {
    el.style.zIndex = ++noteZ;
    el.classList.add('front');
    document.querySelectorAll('.note-wrapper').forEach(o => {
      if (o !== el) o.classList.remove('front');
    });
  };
  el.addEventListener('mousedown', bringToFront);
  el.addEventListener('touchstart', bringToFront, { passive: true });

  // Drag — mouse + touch (skip when clicking header buttons)
  const startDrag = (e, touch) => {
    if (e.target.closest('.note-header-actions')) return;
    const pt = touch || e;
    dragState = { el, type:'drag', sx:pt.clientX, sy:pt.clientY, ox:el.offsetLeft, oy:el.offsetTop };
  };
  header.addEventListener('mousedown', e => startDrag(e));
  header.addEventListener('touchstart', e => {
    if (e.target.closest('.note-header-actions')) return;
    if (e.touches.length === 1) startDrag(e, e.touches[0]);
  }, { passive: false });

  // Resize — mouse + touch
  const startResize = (e, touch) => {
    e.preventDefault(); e.stopPropagation();
    const pt = touch || e;
    dragState = { el, type:'resize', sx:pt.clientX, sy:pt.clientY, ow:el.offsetWidth, oh:el.offsetHeight };
  };
  resize.addEventListener('mousedown', e => startResize(e));
  resize.addEventListener('touchstart', e => {
    e.preventDefault(); e.stopPropagation();
    if (e.touches.length === 1) startResize(e, e.touches[0]);
  }, { passive: false });

  // Archive button
  archiveBtn.addEventListener('click', e => {
    e.stopPropagation();
    archiveNote(note.id);
  });

  // Close button — discard without archiving
  closeBtn.addEventListener('click', e => {
    e.stopPropagation();
    closeNote(note.id);
  });

  // Upload button — trigger file input
  uploadBtn.addEventListener('click', e => {
    e.stopPropagation();
    fileInput.click();
  });

  // File input change — insert files into note body
  fileInput.addEventListener('change', () => {
    const files = fileInput.files;
    if (!files || files.length === 0) return;
    body.focus();
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        const dataUri = ev.target.result;
        if (file.type.startsWith('image/')) {
          document.execCommand('insertHTML', false, noteImgHtml(dataUri, file.name));
        } else {
          const sizeStr = file.size < 1024 ? file.size+'B'
            : file.size < 1048576 ? (file.size/1024).toFixed(1)+'KB'
            : (file.size/1048576).toFixed(1)+'MB';
          document.execCommand('insertHTML', false, noteFileHtml(dataUri, file.name, sizeStr));
        }
        saveNotes();
        updateNoteTitle(note.id);
      };
      reader.readAsDataURL(file);
    });
    fileInput.value = '';
  });

  // Content change → auto save + update title
  let saveTimeout;
  body.addEventListener('input', () => {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
      saveNotes();
      updateNoteTitle(note.id);
    }, 600);
  });
  body.addEventListener('blur', () => {
    saveNotes();
    updateNoteTitle(note.id);
  });

  // Paste handler: images → base64, files → data URI links
  body.addEventListener('paste', e => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const blob = item.getAsFile();
        const fileName = blob.name || 'pasted';
        const reader = new FileReader();
        reader.onload = ev => {
          document.execCommand('insertHTML', false, noteImgHtml(ev.target.result, fileName));
          saveNotes();
          updateNoteTitle(note.id);
        };
        reader.readAsDataURL(blob);
        return;
      }
    }
    // For text/plain content, let default paste handle it
    // For non-image files from clipboard, create data URI
    for (const item of items) {
      if (item.kind === 'file' && !item.type.startsWith('image/')) {
        e.preventDefault();
        const blob = item.getAsFile();
        const reader = new FileReader();
        reader.onload = ev => {
          const dataUri = ev.target.result;
          const fileName = blob.name || 'file';
          const sizeStr = blob.size < 1024 ? blob.size+'B'
            : blob.size < 1048576 ? (blob.size/1024).toFixed(1)+'KB'
            : (blob.size/1048576).toFixed(1)+'MB';
          document.execCommand('insertHTML', false, noteFileHtml(dataUri, fileName, sizeStr));
          saveNotes();
          updateNoteTitle(note.id);
        };
        reader.readAsDataURL(blob);
        return;
      }
    }
  });

  // ── External drag-and-drop support ──
  body.addEventListener('dragover', e => {
    e.preventDefault();
    e.stopPropagation();
    body.style.background = 'rgba(99,102,241,0.12)';
  });
  body.addEventListener('dragleave', e => {
    e.preventDefault();
    e.stopPropagation();
    body.style.background = '';
  });
  body.addEventListener('drop', e => {
    e.preventDefault();
    e.stopPropagation();
    body.style.background = '';
    const files = e.dataTransfer?.files;
    if (!files || files.length === 0) return;

    body.focus();

    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        const dataUri = ev.target.result;
        if (file.type.startsWith('image/')) {
          document.execCommand('insertHTML', false, noteImgHtml(dataUri, file.name));
        } else {
          const sizeStr = file.size < 1024 ? file.size+'B'
            : file.size < 1048576 ? (file.size/1024).toFixed(1)+'KB'
            : (file.size/1048576).toFixed(1)+'MB';
          document.execCommand('insertHTML', false, noteFileHtml(dataUri, file.name, sizeStr));
        }
        saveNotes();
        updateNoteTitle(note.id);
      };
      reader.readAsDataURL(file);
    });
  });

  // ── Download / Delete buttons for images/files in notes ──
  body.addEventListener('click', e => {
    // Download button
    if (e.target.classList.contains('note-item-down')) {
      e.preventDefault();
      e.stopPropagation();
      const uri = e.target.dataset.uri;
      const filename = e.target.dataset.filename || 'download';
      if (uri) {
        const a = document.createElement('a');
        a.href = uri;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        toast('已开始下载');
      }
    }
    // Delete button
    if (e.target.classList.contains('note-item-del')) {
      e.preventDefault();
      e.stopPropagation();
      const wrap = e.target.closest('.note-img-wrap') || e.target.closest('.note-file-wrap');
      if (wrap) {
        const noteEl = wrap.closest('.note-wrapper');
        const noteId = noteEl ? parseInt(noteEl.dataset.noteId) : 0;
        wrap.remove(); saveNotes();
        if (noteId) updateNoteTitle(noteId);
      }
    }
  });

  // ── Drag-out support: drag images/files from note to desktop ──
  body.addEventListener('dragstart', e => {
    const img = e.target.closest('.note-img-wrap img') || e.target.closest('img');
    const fileAttach = e.target.closest('.note-file-wrap .file-attach') || e.target.closest('.file-attach');

    let dataUri, fileName;

    if (img && img.src && img.src.startsWith('data:')) {
      dataUri = img.src;
      fileName = img.alt || 'image.png';
      // Derive extension from MIME type in data URI
      const mimeMatch = dataUri.match(/^data:([^;]+)/);
      if (mimeMatch) {
        const ext = mimeMatch[1].split('/')[1] || 'png';
        if (!fileName.includes('.')) fileName += '.' + ext;
      }
    } else if (fileAttach) {
      const link = fileAttach.querySelector('a');
      if (link && link.href && link.href.startsWith('data:')) {
        dataUri = link.href;
        fileName = link.getAttribute('download') || link.textContent || 'file';
      }
    }

    if (dataUri) {
      // Convert data URI to Blob for native file drag
      const parts = dataUri.split(',');
      const mime = (parts[0].match(/:(.+);/) || [])[1] || 'application/octet-stream';
      const binary = atob(parts[1]);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob = new Blob([bytes], { type: mime });
      e.dataTransfer.setData('DownloadURL', mime + ':' + fileName + ':' + dataUri);
      e.dataTransfer.setData('text/plain', fileName);
      e.dataTransfer.effectAllowed = 'copy';
      // For browsers that support files in drag (Chrome)
      try {
        const file = new File([blob], fileName, { type: mime });
        e.dataTransfer.items.add(file);
      } catch(_) {
        // Fallback: use DownloadURL (works in Chrome)
      }
    }
  });

  document.getElementById('notesContainer').appendChild(el);
}

function renderAllNotes() {
  const container = document.getElementById('notesContainer');
  container.innerHTML = '';
  notes.forEach(n => renderNote(n));
}

// Check if note content is empty (no text, no images, no files)
function isNoteContentEmpty(content) {
  if (!content || !content.trim()) return true;
  const tmp = document.createElement('div');
  tmp.innerHTML = content;
  // Remove delete buttons before checking
  tmp.querySelectorAll('.note-item-del').forEach(d => d.remove());
  const text = (tmp.textContent || '').replace(/\s+/g, '').trim();
  const hasImg = tmp.querySelectorAll('img').length > 0;
  const hasFile = tmp.querySelectorAll('.file-attach').length > 0;
  return !text && !hasImg && !hasFile;
}

// Close note without archiving — just remove
function closeNote(id) {
  const note = notes.find(n => n.id === id);
  if (!note) return;
  const el = document.querySelector(`.note-wrapper[data-note-id="${id}"]`);
  if (el) {
    const body = el.querySelector('.note-body');
    if (body) note.content = body.innerHTML;
    el.remove();
  }
  // Discard if empty, otherwise keep locally (does not archive)
  if (isNoteContentEmpty(note.content)) {
    notes = notes.filter(n => n.id !== id);
  } else {
    // Non-empty: remove from active but don't archive
    notes = notes.filter(n => n.id !== id);
    toast('便签已关闭（未归档）');
  }
  saveNotes();
}

// Archive note: move to archived list
function archiveNote(id) {
  const note = notes.find(n => n.id === id);
  if (!note) return;
  // Sync latest DOM content
  const el = document.querySelector(`.note-wrapper[data-note-id="${id}"]`);
  if (el) {
    const body = el.querySelector('.note-body');
    if (body) note.content = body.innerHTML;
    el.remove();
  }

  if (isNoteContentEmpty(note.content)) {
    // Empty note: just discard
    notes = notes.filter(n => n.id !== id);
    saveNotes();
    return;
  }

  note.updatedAt = Date.now();
  notes = notes.filter(n => n.id !== id);
  notesArchived.unshift(note);
  saveNotes();
  saveArchived();
}

// Permanently delete from archive
let pendingDeleteId = null;

function deleteArchivedNote(id) {
  const note = notesArchived.find(n => n.id === id);
  // Long-term notes require confirmation
  if (note && note.longTerm) {
    pendingDeleteId = id;
    document.getElementById('confirmText').textContent = '确定要删除该长期保留的便签吗？';
    document.getElementById('confirmOverlay').classList.remove('hidden');
    return;
  }
  notesArchived = notesArchived.filter(n => n.id !== id);
  saveArchived();
  renderNotesHistory();
  toast('便签已永久删除');
}

function confirmDelete() {
  if (pendingDeleteId === -1) {
    const count = historySelected.size;
    notesArchived = notesArchived.filter(n => !historySelected.has(n.id));
    historySelected.clear();
  } else if (pendingDeleteId) {
    notesArchived = notesArchived.filter(n => n.id !== pendingDeleteId);
  }
  pendingDeleteId = null;
  saveArchived();
  renderNotesHistory();
  document.getElementById('confirmOverlay').classList.add('hidden');
  toast('便签已永久删除');
}

function closeConfirm() {
  pendingDeleteId = null;
  document.getElementById('confirmOverlay').classList.add('hidden');
}

// Restore from archive
function restoreNote(id) {
  const note = notesArchived.find(n => n.id === id);
  if (!note) return;
  note.updatedAt = Date.now();
  notesArchived = notesArchived.filter(n => n.id !== id);
  notes.push(note);
  saveNotes();
  saveArchived();
  renderNote(note);
  renderNotesHistory();
  toast('便签已恢复');
}

function toggleLongTerm(id) {
  const note = notesArchived.find(n => n.id === id);
  if (!note) return;
  note.longTerm = !note.longTerm;
  saveArchived();
  renderNotesHistory();
  toast(note.longTerm ? '已设为长期保留' : '已取消长期保留');
}

// History panel
let historySelected = new Set();

function renderNotesHistory() {
  const list = document.getElementById('notesHistoryList');
  const selectAllLabel = document.getElementById('selectAllLabel');
  const selectAllCheckbox = document.getElementById('selectAllNotes');
  const btnBatchDel = document.getElementById('btnBatchDel');
  historySelected.clear();

  if (notesArchived.length === 0) {
    list.innerHTML = '<div class="text-white/20 text-xs text-center py-10">暂无已归档的便签</div>';
    selectAllLabel.style.display = 'none';
    btnBatchDel.style.display = 'none';
    return;
  }
  selectAllLabel.style.display = 'flex';
  btnBatchDel.style.display = 'flex';
  selectAllCheckbox.checked = false;
  updateBatchDelBtn();

  const longtermNotes = notesArchived.filter(n => n.longTerm);
  const regularNotes = notesArchived.filter(n => !n.longTerm);

  let htmlOut = '';

  if (longtermNotes.length > 0) {
    htmlOut += '<div class="notes-history-section-title longterm">◆ 长期保留</div>';
    htmlOut += longtermNotes.map(n => renderHistoryItem(n)).join('');
  }
  if (regularNotes.length > 0) {
    htmlOut += '<div class="notes-history-section-title">已归档的便签</div>';
    htmlOut += regularNotes.map(n => renderHistoryItem(n)).join('');
  }

  list.innerHTML = htmlOut || '<div class="text-white/20 text-xs text-center py-10">暂无已归档的便签</div>';
}

function renderHistoryItem(n) {
  const noteObj = { id: n.id, content: n.content || '' };
  const displayName = generateNoteName(noteObj);
  const rawText = n.content ? n.content.replace(/<[^>]*>/g, '').replace(/\s+/g, ' ').trim() : '';
  const date = n.updatedAt ? new Date(n.updatedAt).toLocaleString('zh-CN') : '';
  const isLT = n.longTerm;
  return `
    <div class="notes-history-item${isLT?' longterm':''}">
      <input type="checkbox" class="history-item-check" data-id="${n.id}" onchange="onHistoryItemToggle(this)" style="accent-color:#6366f1;width:14px;height:14px;cursor:pointer;flex-shrink:0">
      <span class="note-archive-badge">#${n.id}</span>
      <span class="notes-history-preview" title="${date + (rawText ? '\\n' + rawText.substring(0, 80) : '') }">${displayName}</span>
      <span style="color:rgba(255,255,255,0.18);font-size:10px;flex-shrink:0">${date}</span>
      <div class="notes-history-actions">
        <button class="btn-history-longterm${isLT?' active':''}" onclick="toggleLongTerm(${n.id})" title="${isLT?'取消长期保留':'设为长期保留'}">${isLT?'长期':'长期'}</button>
        <button class="btn-history-restore" onclick="restoreNote(${n.id})" title="恢复">↩</button>
        <button class="btn-history-delete" onclick="deleteArchivedNote(${n.id})" title="永久删除">×</button>
      </div>
    </div>`;
}

function onHistoryItemToggle(checkbox) {
  const id = parseInt(checkbox.dataset.id);
  if (checkbox.checked) historySelected.add(id);
  else historySelected.delete(id);
  updateBatchDelBtn();
}

function updateBatchDelBtn() {
  const btn = document.getElementById('btnBatchDel');
  if (btn) btn.textContent = historySelected.size > 0 ? `删除选中(${historySelected.size})` : '删除选中';
}

function toggleSelectAllNotes() {
  const checked = document.getElementById('selectAllNotes').checked;
  document.querySelectorAll('.history-item-check').forEach(cb => {
    cb.checked = checked;
    const id = parseInt(cb.dataset.id);
    if (checked) historySelected.add(id);
    else historySelected.delete(id);
  });
  updateBatchDelBtn();
}

function batchDeleteNotes() {
  if (historySelected.size === 0) return;
  const hasLongterm = notesArchived.some(n => historySelected.has(n.id) && n.longTerm);
  if (hasLongterm) {
    pendingDeleteId = -1;
    document.getElementById('confirmText').textContent = `选中项中包含长期保留的便签，确认删除共 ${historySelected.size} 条记录？`;
    document.getElementById('confirmOverlay').classList.remove('hidden');
    return;
  }
  const count = historySelected.size;
  notesArchived = notesArchived.filter(n => !historySelected.has(n.id));
  historySelected.clear();
  saveArchived();
  renderNotesHistory();
  toast(`已删除 ${count} 条记录`);
}

function toggleNotesHistory() {
  const overlay = document.getElementById('notesHistoryOverlay');
  const isOpen = overlay.classList.contains('show');
  if (isOpen) {
    overlay.classList.remove('show');
  } else {
    renderNotesHistory();
    overlay.classList.add('show');
  }
}

// Close history on overlay click
document.getElementById('notesHistoryOverlay').addEventListener('click', function(e) {

});

// Close confirm on overlay click
document.getElementById('confirmOverlay').addEventListener('click', function(e) {

// Global move handler — mouse + touch
function handleMove(e, touch) {
  if (!dragState) return;
  const pt = touch || e;
  const { el, type, sx, sy, ox, oy, ow, oh } = dragState;
  if (type === 'drag') {
    const nx = Math.max(0, Math.min(window.innerWidth - 80, ox + (pt.clientX - sx)));
    const ny = Math.max(0, Math.min(window.innerHeight - 40, oy + (pt.clientY - sy)));
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
  } else if (type === 'resize') {
    const nw = Math.max(200, ow + (pt.clientX - sx));
    const nh = Math.max(140, oh + (pt.clientY - sy));
    el.style.width = nw + 'px';
    el.style.height = nh + 'px';
  }
}
function handleUp() {
  if (!dragState) return;
  const { el } = dragState;
  const id = parseInt(el.dataset.noteId);
  const note = notes.find(n => n.id === id);
  if (note) {
    note.x = el.offsetLeft;
    note.y = el.offsetTop;
    note.w = el.offsetWidth;
    note.h = el.offsetHeight;
  }
  dragState = null;
  saveNotes();
}
document.addEventListener('mousemove', e => handleMove(e));
document.addEventListener('mouseup', handleUp);
document.addEventListener('touchmove', e => {
  if (dragState && e.touches.length === 1) {
    e.preventDefault();
    handleMove(e, e.touches[0]);
  }
}, { passive: false });
document.addEventListener('touchend', handleUp);

// ============ 云端同步 ============

let supabaseClient = null;
let syncCode = '';
let syncChannel = null;
let syncPending = false;

const SUPABASE_URL = 'https://lsqjeqknwqlkwfqdofyc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6lSjxD8oKLdzyTtxaJ39wA_SDpaM3aC';

function initSync() {
  syncCode = localStorage.getItem('sp_sync_code') || '';
  if (!syncCode) { updateSyncUI(); return; }
  if (!SUPABASE_URL.includes('__YOUR_')) initSupabase();
}

function initSupabase() {
  if (supabaseClient) return;
  try {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      db: { schema: 'public' },
      global: { headers: { 'x-sync-code': syncCode } }
    });
    subscribeToChanges();
    // Pull remote changes on startup
    pullFromCloud();
    updateSyncUI();
  } catch(e) { console.log('Supabase init failed:', e); }
}

async function subscribeToChanges() {
  if (!supabaseClient || syncChannel) return;
  syncChannel = supabaseClient
    .channel('notes-changes')
    .on('postgres_changes',
      { event: '*', schema: 'public', table: 'notes_sync', filter: `sync_code=eq.${syncCode}` },
      (payload) => {
        if (payload.eventType === 'DELETE') return;
        const record = payload.new;
        if (!record || !record.data) return;
        applyRemoteData(record.data, record.id);
      }
    )
    .subscribe();
}

function applyRemoteData(remoteData, rowId) {
  if (!remoteData) return;
  try {
    // 仅处理已归档的便签同步，不覆盖本地的活跃便签
    const { archivedNotes } = remoteData;
    if (archivedNotes) {
      notesArchived = archivedNotes;
      const allIds = [...notes, ...notesArchived].map(n => n.id||0);
      noteIdCounter = allIds.length ? Math.max(...allIds) : noteIdCounter;
      localStorage.setItem('sp_notes_archived', JSON.stringify(notesArchived));
      // 刷新历史面板（如果当前已打开）
      if (document.getElementById('notesHistoryOverlay').classList.contains('show')) {
        renderNotesHistory();
      }
    }
  } catch(e) { console.log('Apply remote data failed:', e); }
}

async function pushToCloud() {
  if (!supabaseClient || !syncCode) return;
  if (syncPending) return;
  syncPending = true;
  try {
    // Upsert: one row per sync_code, storing all notes as JSON
    // 仅同步已归档的便签（含长期保留），活跃便签不同步
    const payload = {
      data: {
        archivedNotes: notesArchived
      }
    };
    // Check if row exists
    const { data: existing } = await supabaseClient
      .from('notes_sync')
      .select('id')
      .eq('sync_code', syncCode)
      .limit(1);

    if (existing && existing.length > 0) {
      await supabaseClient.from('notes_sync')
        .update({ data: payload.data, updated_at: new Date().toISOString() })
        .eq('sync_code', syncCode);
    } else {
      await supabaseClient.from('notes_sync')
        .insert({ sync_code: syncCode, data: payload.data });
    }
  } catch(e) { console.log('Push to cloud failed:', e); }
  syncPending = false;
}

async function pullFromCloud() {
  if (!supabaseClient || !syncCode) return;
  try {
    const { data } = await supabaseClient
      .from('notes_sync')
      .select('data')
      .eq('sync_code', syncCode)
      .order('updated_at', { ascending: false })
      .limit(1);

    if (data && data.length > 0 && data[0].data) {
      const remote = data[0].data;
      const remoteArchived = remote.archivedNotes || [];
      // 仅合并已归档便签：远程同 ID 覆盖本地，本地新增保留
      const merge = (localArr, remoteArr) => {
        const map = new Map();
        localArr.forEach(n => map.set(n.id, n));
        remoteArr.forEach(n => map.set(n.id, n));
        return Array.from(map.values()).sort((a, b) => a.id - b.id);
      };
      notesArchived = merge(notesArchived, remoteArchived);
      const allIds = [...notes, ...notesArchived].map(n => n.id||0);
      noteIdCounter = allIds.length ? Math.max(...allIds) : noteIdCounter;
      localStorage.setItem('sp_notes_archived', JSON.stringify(notesArchived));
      // 刷新历史面板（如果当前已打开）
      if (document.getElementById('notesHistoryOverlay').classList.contains('show')) {
        renderNotesHistory();
      }
      // Push merged result back
      pushToCloud();
    }
  } catch(e) { console.log('Pull from cloud failed:', e); }
}

// ── UI ──
function updateSyncUI() {
  const joinSection = document.getElementById('syncJoinSection');
  const activeSection = document.getElementById('syncActiveSection');
  const btnSync = document.getElementById('btnSyncHistory');
  if (!joinSection || !activeSection) return;

  if (syncCode && supabaseClient) {
    joinSection.style.display = 'none';
    activeSection.style.display = 'block';
    document.getElementById('syncCodeDisplay').textContent = syncCode;
    document.getElementById('syncStatusText').textContent = '已连接';
    document.getElementById('syncStatusDot').className = 'sync-status-dot on';
    if (btnSync) btnSync.style.color = 'rgba(34,197,94,0.8)';
    // Generate QR code
    setTimeout(() => {
      const qrWrap = document.getElementById('syncQrWrap');
      if (qrWrap && !qrWrap.querySelector('canvas')) {
        new QRCode(qrWrap, { text: syncCode, width: 140, height: 140,
          colorDark: '#ffffff', colorLight: 'rgba(22,30,50,0.94)', correctLevel: QRCode.CorrectLevel.L });
      }
    }, 100);
  } else {
    joinSection.style.display = 'block';
    activeSection.style.display = 'none';
    if (btnSync) btnSync.style.color = 'rgba(255,255,255,0.45)';
  }
}

function toggleSyncPanel() {
  const overlay = document.getElementById('syncOverlay');
  if (!overlay) return;
  updateSyncUI();
  overlay.classList.add('show');
}

function closeSyncPanel() {
  document.getElementById('syncOverlay').classList.remove('show');
}

function joinSync() {
  const input = document.getElementById('syncCodeInput');
  const code = input.value.trim();
  if (!code) { toast('请输入同步码'); return; }
  if (!SUPABASE_URL.includes('__YOUR_')) {
    syncCode = code;
    localStorage.setItem('sp_sync_code', syncCode);
    initSupabase();
    pushToCloud();
    updateSyncUI();
    toast('已加入同步');
    input.value = '';
  } else {
    toast('请先配置 Supabase 连接信息');
  }
}

function generateSyncCode() {
  // Word-based sync code: adj-noun-number
  const adj = ['Blue','Red','Gold','Dark','Neon','Silk','Wild','Deep','Lone','Nova','Star','Moon','Fire','Ice','Zen'];
  const noun = ['Fox','Wolf','Hawk','Bear','Lynx','Owl','Jay','Elk','Orca','Crab','Deer','Crow','Fin','Ray','Bee'];
  const adj2 = adj[Math.floor(Math.random()*adj.length)];
  const noun2 = noun[Math.floor(Math.random()*noun.length)];
  const num = Math.floor(Math.random()*9000)+1000;
  return adj2 + '-' + noun2 + '-' + num;
}

function createSyncCode() {
  if (!SUPABASE_URL.includes('__YOUR_')) {
    syncCode = generateSyncCode();
    localStorage.setItem('sp_sync_code', syncCode);
    initSupabase();
    pushToCloud();
    updateSyncUI();
    toast('同步码已生成');
  } else {
    toast('请先配置 Supabase 连接信息');
  }
}

function copySyncCode() {
  if (!syncCode) return;
  navigator.clipboard?.writeText(syncCode).then(() => toast('同步码已复制'));
}

function disconnectSync() {
  if (!confirm('断开同步后，其他设备将无法获取此设备的便签更新。确定断开？')) return;
  syncCode = '';
  localStorage.removeItem('sp_sync_code');
  if (syncChannel) { supabaseClient.removeChannel(syncChannel); syncChannel = null; }
  supabaseClient = null;
  updateSyncUI();
  toast('已断开同步');
}
